name: Google Alert Telegram Bot

on:
  schedule:
    # GitHub Actions는 UTC 기준! 한국시간(KST) = UTC + 9
    # 한국 08:00 = UTC 23:00 (전날) / 한국 17:00 = UTC 08:00
    - cron: '0 23 * * *'   # KST 오전 8시
    - cron: '0 8 * * *'    # KST 오후 5시
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # sent.json 커밋하려면 필요

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          RSS_URL:   ${{ secrets.RSS_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python alert_bot.py

      - name: Commit sent.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sent.json
          git diff --staged --quiet || git commit -m "Update sent articles"
          git push
